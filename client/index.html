<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCast - Instant Screen Share</title>
    <meta name="description" content="Share your screen instantly with anyone, anywhere using QR codes">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QCast">
    
    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
    
    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated Particles Background -->
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <!-- Background Animation -->
        <div class="bg-animation">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
        </div>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Home Page -->
            <div id="homePage" class="page active">
                <div class="glass-card">
                    <header class="app-header">
                        <div class="logo">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                        </div>
                        <h1 class="app-title">QCast</h1>
                        <p class="app-subtitle">Share your screen instantly with anyone, anywhere</p>
                    </header>
                    
                    <div class="action-buttons">
                        <button id="startSharingBtn" class="btn-primary">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7"></path>
                            </svg>
                            Start Sharing
                        </button>
                        <button id="scanQRBtn" class="btn-secondary">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect>
                            </svg>
                            Scan QR Code
                        </button>
                        
                        <button id="installBtn" class="btn-install" style="display: none;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Install App
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Host Page -->
            <div id="hostPage" class="page">
                <div class="glass-card">
                    <header class="page-header">
                        <button id="backToHomeBtn" class="btn-back">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 12H5M12 19l-7-7 7-7"></path>
                            </svg>
                        </button>
                        <h2>Share Your Screen</h2>
                    </header>
                    
                    <div class="host-content">
                        <!-- Session Info -->
                        <div class="session-info">
                            <p class="session-label">Session ID:</p>
                            <div class="session-id-container">
                                <span id="sessionId" class="session-id"></span>
                                <button id="copyLinkBtn" class="btn-copy">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <!-- QR Code -->
                        <div class="qr-container">
                            <div id="qrcode" class="qr-code"></div>
                            <div class="qr-pulse"></div>
                        </div>
                        
                        <!-- Status Indicator -->
                        <div class="status-container">
                            <div id="statusIndicator" class="status-indicator waiting">
                                <div class="status-dot"></div>
                                <span id="statusText">Waiting for connection...</span>
                            </div>
                        </div>
                        
                        <!-- Screen Preview -->
                        <div class="preview-container">
                            <video id="previewVideo" class="preview-video" muted autoplay playsinline></video>
                            <div id="previewPlaceholder" class="preview-placeholder">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                    <line x1="8" y1="21" x2="16" y2="21"></line>
                                    <line x1="12" y1="17" x2="12" y2="21"></line>
                                </svg>
                                <p>Screen preview will appear here</p>
                            </div>
                        </div>
                        
                        <!-- Control Buttons -->
                        <div class="control-buttons">
                            <button id="startCaptureBtn" class="btn-primary">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polygon points="10 8 16 12 10 16 10 8"></polygon>
                                </svg>
                                Start Screen Capture
                            </button>
                            
                            <button id="stopCaptureBtn" class="btn-danger" style="display: none;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="6" y="6" width="12" height="12"></rect>
                                </svg>
                                Stop Sharing
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- QR Scanner Page -->
            <div id="scannerPage" class="page">
                <div class="glass-card">
                    <header class="page-header">
                        <button id="backToHomeFromScannerBtn" class="btn-back">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 12H5M12 19l-7-7 7-7"></path>
                            </svg>
                        </button>
                        <h2>Scan QR Code</h2>
                    </header>
                    
                    <div class="scanner-content">
                        <div id="qrScanner" class="qr-scanner">
                            <video id="scannerVideo" class="scanner-video"></video>
                            <div class="scanner-overlay">
                                <div class="scan-frame"></div>
                                <div class="scan-line"></div>
                            </div>
                        </div>
                        
                        <div class="scanner-info">
                            <p>Position the QR code within the frame to scan</p>
                            <button id="switchCameraBtn" class="btn-secondary">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                    <circle cx="12" cy="13" r="4"></circle>
                                </svg>
                                Switch Camera
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
            <p>Connecting...</p>
        </div>
        
        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>
    </div>
    
    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
